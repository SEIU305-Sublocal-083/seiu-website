name: Publish Scheduled News

on:
  schedule:
    - cron: "11 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Publish news due in Oregon local time
        run: python3 scripts/publish_scheduled_news.py

      - name: Commit published content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':(glob)**/*.html' news/news.json news/rss.xml events/rss.xml feed.xml sitemap.xml robots.txt styles/tailwind.css
          if git diff --cached --quiet; then
            echo "No scheduled news was due."
            exit 0
          fi
          git commit -m "chore: publish scheduled news"
          git push
